name: Build Universal

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/sundownersport/sprucechat-builder-universal

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.universal
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE }}:cache,mode=max

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ccache
          key: ccache-universal-${{ github.sha }}
          restore-keys: ccache-universal-

      - name: Build llama.cpp
        run: |
          mkdir -p output ccache
          docker run --rm \
            -v ${{ github.workspace }}/output:/output \
            -v ${{ github.workspace }}/ccache:/ccache \
            ${{ env.IMAGE }}:latest

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpruceChat-universal
          path: output/
